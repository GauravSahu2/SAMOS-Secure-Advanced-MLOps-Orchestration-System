# 🎡 SAMOS: Kubernetes Deployment
# High-Assurance Orchestration Manifest

apiVersion: apps/v1
kind: Deployment
metadata:
  name: samos-sentient
  labels:
    app: samos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: samos
  template:
    metadata:
      labels:
        app: samos
    spec:
      automountServiceAccountToken: false
      containers:
      - name: samos-engine
        image: samos:1.1.0
        ports:
        - containerPort: 7860
        
        # 📈 Resource Hardening (Phase 24)
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
            ephemeral-storage: "1Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
            ephemeral-storage: "512Mi"
        
        # 💳 SRE Health Checks (Phase 25) — use dedicated /health endpoint
        livenessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        
        # 🛡️ Environment Hardening
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: "."
        - name: PORT
          value: "7860"
        - name: LOG_LEVEL
          value: "INFO"

---
apiVersion: v1
kind: Service
metadata:
  name: samos-service
spec:
  selector:
    app: samos
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7860
  type: LoadBalancer
