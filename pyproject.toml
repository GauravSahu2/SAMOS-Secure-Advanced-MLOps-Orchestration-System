[tool.mutmut]
paths_to_mutate = "src/sre/serve.py"
backup = false
runner = "python -m pytest"
tests_dir = "tests/"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "B", "S"] # Security, Bugbear, Error, Flake
ignore = ["E501", "S110", "S101", "S310", "S311", "S603", "S107", "S106"]

[tool.mypy]
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
pythonpath = ["."]
addopts = "-v --tb=short --cov=src --cov-report=xml --cov-report=term-missing"
asyncio_mode = "auto"
