# 🛡️ Pinaka 4B: .gitleaks.toml
# Secret Scanning Configuration (High-Assurance)

[allowlist]
description = "Allowlist for non-sensitive public hashes"
regexes = [
    'ef9386625abc8feb45ba298ab6e02c05d02418bd38e5e7437f4904b6ce82c7f2', # Model Integrity Hash
    '(?i)\$\{\{\s*secrets\.[a-za-z0-9_]+\s*\}\}', # GitHub Actions Secrets
    '(?i)your_sonarcloud_token|hf_YOUR_TOKEN_HERE|change_this_strong_password_123|change_me_on_first_login|your_sonar_token|change_me_to_a_random_32char_string|your_codecov_token' # Placeholders
]
paths = [
    '''\.env$''',
    '''\.env\.example$''',
    '''\.gitleaks\.toml$''',
    '''requirements\.txt$'''
]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)secret|password|token|key|api_key|private_key'''
severity = "critical"

[[rules]]
id = "paseto-key"
description = "High-Assurance PASETO Key"
regex = '''v4\.public\.[A-Za-z0-9_-]+'''
severity = "critical"
