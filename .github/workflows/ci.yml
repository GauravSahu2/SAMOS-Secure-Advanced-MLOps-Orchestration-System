# ================================================================================
# SAMOS CI: The Validation Gauntlet
# TRIGGER: Every push and pull_request to main
# PURPOSE: Catch bugs, security issues, and style violations before they merge.
# ================================================================================

name: "🏹 SAMOS: CI Validation Gauntlet"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

jobs:
  # ── TIER 1: Static Analysis & Security ──────────────────────────────────────
  lint-and-sast:
    name: "🛡️ Tier 1 — Lint, Type-Check & SAST"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 Install Analysis Tools"
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.12 bandit==1.9.4 mypy==1.20.2
          pip install pandas numpy psutil scikit-learn fastapi pydantic

      - name: "✏️ Ruff: Style & Lint"
        run: ruff check src/ --output-format=github

      - name: "🔒 Bandit: SAST Security Scan"
        run: bandit -r src/ -ll -x src/ml_ops/pinaka_forge_v2.py

      - name: "🔍 MyPy: Type Safety"
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Type errors are non-blocking for now

  # ── TIER 2: Secret Scanning ───────────────────────────────────────────────────
  secret-scan:
    name: "🔑 Tier 2 — Secret Detection (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: "🔑 Gitleaks: Secret Scan"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TIER 3: Unit Tests & Coverage ────────────────────────────────────────────
  test:
    name: "🧪 Tier 3 — Pytest & Coverage"
    runs-on: ubuntu-latest
    needs: lint-and-sast
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 Install Test Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pytest==9.0.3 pytest-cov==7.1.0
          pip install pandas numpy scikit-learn mlflow fastapi pydantic psutil httpx

      - name: "🧪 Run Tests with Coverage"
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short
        env:
          PYTHONPATH: "."
          MLFLOW_TRACKING_URI: "sqlite:///test_mlflow.db"

      - name: "📊 Upload Coverage to Codecov"
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── TIER 4: SonarQube Code Quality ───────────────────────────────────────────
  sonarqube:
    name: "🔭 Tier 4 — SonarQube Analysis"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # Only on push, not on PRs (saves quota)
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔭 SonarQube Scan"
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── TIER 5: Docker Build Validation ──────────────────────────────────────────
  docker-build:
    name: "🐳 Tier 5 — Docker Build Validation"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐳 Build Docker Image (Validation Only)"
        run: docker build -t samos:ci-${{ github.sha }} .

      - name: "🔍 Trivy: Container Vulnerability Scan"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: samos:ci-${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Non-blocking: report only

      - name: "📤 Upload Trivy SARIF"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        if: always()

  # ── TIER 6: SBOM Generation (Audit Bundle) ───────────────────────────────────
  sbom:
    name: "📋 Tier 6 — SBOM Generation"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📋 Generate SBOM"
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements requirements.txt --of json -o sbom.json

      - name: "📦 Upload Audit Bundle"
        uses: actions/upload-artifact@v4
        with:
          name: samos-audit-bundle-${{ github.sha }}
          retention-days: 90
          path: |
            sbom.json
            coverage.xml
