# 🏹 SAMOS: .github/workflows/gauntlet.yml
# ROLE: The Automated CI Pipeline (The Sky Watcher)
# TRIGGER: Automatically triggered by 'git push' to main/master branches.

name: "🏆 SAMOS: The 32-Tier Validation Gauntlet"

on:
  push:
    branches: [ main, master ] # [TRIGGER] Executes when code is pushed to these branches.
  pull_request:
    branches: [ main, master ] # [TRIGGER] Executes when a PR is opened.

jobs:
  gauntlet:
    runs-on: ubuntu-latest # Runs in a clean Linux environment in the cloud.
    steps:
      - name: 📥 Clone Repository
        uses: actions/checkout@v4 # [TRIGGER] Clones your SAMOS code into the CI runner.

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5 # [TRIGGER] Installs the Python interpreter.
        with:
          python-version: "3.12"

      - name: 📦 Install Dependencies
        # [TRIGGER] Installs every tool listed in 'requirements.txt'.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🛡️ Tier 01-04: Static Analysis"
        # [TRIGGER] Executes Ruff, Bandit, and Mypy for code health.
        run: |
          ruff check src
          bandit -r src
          mypy src

      - name: "🧪 Tier 05-09: Dynamic Logic"
        # [TRIGGER] Executes Pytest to verify functional business logic.
        run: pytest --cov=src --cov-report=xml

      - name: "🔑 Tier 10: Secret Scanning"
        # [TRIGGER] Triggers Gitleaks to find hardcoded passwords/keys.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔍 Tier 15: SonarQube Analysis"
        # [TRIGGER] Runs SonarQube Scanner for Enterprise-grade code quality and security checks.
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: "🐳 Tier 24: Docker Build"
        # [TRIGGER] Validates the Dockerfile by building the image.
        run: docker build -t samos .

      - name: "📋 Tier 32: SBOM Generation"
        # [TRIGGER] Generates the 'sbom.json' for auditors.
        run: cyclonedx-py --format json --output sbom.json

      - name: 📦 Upload Audit Bundle
        # [TRIGGER] Saves the reports as downloadable artifacts in GitHub.
        uses: actions/upload-artifact@v4
        with:
          name: samos-audit-bundle
          path: |
            sbom.json
            coverage.xml
