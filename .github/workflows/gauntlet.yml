# 🏹 SAMOS: .github/workflows/gauntlet.yml
# ROLE: Full 32-Tier Security Gauntlet
# TRIGGER: Weekly + manual dispatch (heavy workflow — runs separately from fast CI)

name: "🏆 SAMOS: The 32-Tier Validation Gauntlet"

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  gauntlet:
    name: "🏆 Full Gauntlet"
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 Install Core Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit mypy pytest pytest-cov
          pip install pandas numpy scikit-learn fastapi pydantic psutil mlflow httpx
          pip install prometheus-client

      - name: "🛡️ Tier 01: Ruff Lint"
        run: ruff check src/ --output-format=github

      - name: "🔒 Tier 02: Bandit SAST"
        run: bandit -r src/ -ll -x src/ml_ops/pinaka_forge_v2.py

      - name: "🔍 Tier 03: MyPy Type Safety"
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: "🔑 Tier 04: Gitleaks Secret Scan"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🧪 Tier 05: Full Test Suite with Coverage"
        run: pytest tests/ --ignore=tests/test_pipeline.py -v --cov=src --cov-report=xml --tb=short
        env:
          PYTHONPATH: "."
          MLFLOW_TRACKING_URI: "sqlite:///test_mlflow.db"

      - name: "📊 Tier 06: Upload Coverage to Codecov"
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: "🔭 Tier 07: SonarQube Analysis"
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "🐳 Tier 08: Docker Build"
        run: docker build -t samos:gauntlet-${{ github.sha }} .

      - name: "🔍 Tier 09: Trivy Container Scan"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: samos:gauntlet-${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: "📤 Upload Trivy SARIF"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        if: always()

      - name: "📋 Tier 10: SBOM Generation"
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements requirements.txt --of json -o sbom.json

      - name: "📦 Upload Audit Bundle"
        uses: actions/upload-artifact@v4
        with:
          name: samos-gauntlet-audit-${{ github.sha }}
          retention-days: 90
          path: |
            sbom.json
            coverage.xml
            trivy-results.sarif
