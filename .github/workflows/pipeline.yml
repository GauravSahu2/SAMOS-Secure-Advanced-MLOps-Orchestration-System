# Phase 17: CI Pipeline (GitHub Actions)
name: MLOps-DevSecOps-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: DataOps & Training
      run: python main.py
      
    - name: Run Security Scans (SAST)
      run: python src/devsecops/security.py
      
    - name: Model Optimization
      run: python src/devsecops/optimize.py ./models/churn_model onnx
      
    - name: Build and Push Docker Image
      run: |
        docker build -t ml-pipeline:latest .
        # docker push my-registry/ml-pipeline:latest
