version: '3.8'

services:
  # --- DATAOPS BACKBONE ---
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: samos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: samos-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MODE=master

  spark-worker:
    image: bitnami/spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077

  # --- MLOPS HUB ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: samos-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db

  ray-head:
    image: rayproject/ray:latest
    container_name: ray-head
    ports:
      - "6379:6379"
      - "8265:8265"
      - "10001:10001"
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0

  # --- SECURITY & GOVERNANCE ---
  vault:
    image: hashicorp/vault:latest
    container_name: samos-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: samos_root_token
      VAULT_ADDR: 'http://0.0.0.0:8200'

  sonarqube:
    image: sonarqube:community
    container_name: samos-sonarqube
    ports:
      - "9000:9000"

  # --- SRE & OBSERVABILITY ---
  prometheus:
    image: prom/prometheus:latest
    container_name: samos-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: samos-grafana
    ports:
      - "3001:3000"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: samos-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"

networks:
  samos-enterprise:
    driver: bridge
