version: '3.8'

services:
  # SAMOS Core Engine
  samos-factory:
    build: .
    container_name: samos-factory
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - REDIS_URL=redis://redis-cache:6379
    depends_on:
      - mlflow-server
      - redis-cache
    networks:
      - samos-network

  # Apache NiFi: Data Orchestration & Ingestion
  nifi:
    image: apache/nifi:latest
    container_name: samos-nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=samos_secure_password_123
    networks:
      - samos-network

  # MLflow: Experiment Tracking
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/artifacts
    networks:
      - samos-network

  # Redis: Distributed Caching & Queue
  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - samos-network

  # Prometheus: Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - samos-network

  # Grafana: Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - samos-network

networks:
  samos-network:
    driver: bridge
